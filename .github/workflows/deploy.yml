name: Deploy Frontend to Server

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/devops_stack

            # Fix the redirect regex in docker-compose.yml to prevent redirect loops
            sed -i 's/regex=\^https?:\/\/(?:www\\.)?(.+)/regex=^https?:\\/\\/xn--autovrdi-n0a.dk(.*)/g' docker-compose.yml
            sed -i 's/replacement=https:\/\/www.\$\${1}/replacement=https:\/\/www.xn--autovrdi-n0a.dk$${1}/g' docker-compose.yml

            # Pull latest frontend code
            cd Website-IKA-Car-DK
            git fetch origin main
            git reset --hard origin/main
            cd ..

            # Rebuild and restart
            # Using 'up -d --build' is faster and handles stop/rm automatically
            docker-compose up -d --build frontend

            # Clean up old images
            docker image prune -f

            echo "Frontend deployed successfully!"
