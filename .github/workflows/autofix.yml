name: autofix.ci # needs to use this name

on:
  pull_request:
  push:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run fmt

      - uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8
